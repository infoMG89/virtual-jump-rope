<!DOCTYPE html>
<html lang="cs">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Svihej — Beat Jump</title>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
body {
    background: #04000c;
    color: #e0d8f0;
    font-family: system-ui, sans-serif;
    height: 100vh;
    overflow: hidden;
    display: flex;
    flex-direction: column;
}
canvas#gc {
    position: fixed;
    inset: 0;
    width: 100%;
    height: 100%;
    pointer-events: none;
}
video { display: none; }

/* HUD overlays — all on top of canvas */
#hud {
    position: fixed;
    inset: 0;
    pointer-events: none;
    display: flex;
    flex-direction: column;
}
#topBar {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 14px 24px 0;
    pointer-events: none;
}
#scoreBlock {
    text-align: right;
}
#scoreVal {
    font-size: 52px;
    font-weight: 900;
    color: #fff;
    line-height: 1;
    font-variant-numeric: tabular-nums;
    text-shadow: 0 0 20px rgba(180,80,255,0.8);
}
#comboVal {
    font-size: 18px;
    font-weight: 700;
    color: #bf80ff;
    text-align: right;
    min-height: 24px;
}
#bpmBlock {
    display: flex;
    flex-direction: column;
    gap: 6px;
    pointer-events: all;
}
#bpmLabel { font-size: 11px; color: #7050a0; text-transform: uppercase; letter-spacing: 0.1em; }
#bpmLive  { font-size: 12px; color: #9060d0; min-height: 16px; }
#trackBlock { display:flex; flex-direction:column; gap:6px; pointer-events:all; }
#trackLabel { font-size:11px; color:#7050a0; text-transform:uppercase; letter-spacing:.1em; }
#trackBtns  { display:flex; gap:6px; }
.track-btn  {
    background: rgba(40,0,70,0.55);
    border: 1px solid rgba(130,0,220,0.35);
    color: #a080d0;
    padding: 5px 11px;
    border-radius: 7px;
    font-size: 12px;
    font-weight: 700;
    cursor: pointer;
    white-space: nowrap;
}
.track-btn.active {
    background: rgba(120,0,220,0.55);
    border-color: rgba(200,80,255,0.7);
    color: #f0d0ff;
}
#bpmSelect {
    background: rgba(40,0,70,0.7);
    border: 1px solid rgba(130,0,220,0.4);
    color: #d0b0ff;
    padding: 6px 12px;
    border-radius: 8px;
    font-size: 15px;
    font-weight: 700;
    cursor: pointer;
}

#feedback {
    position: fixed;
    left: 50%;
    top: 38%;
    transform: translate(-50%, -50%);
    font-size: 54px;
    font-weight: 900;
    letter-spacing: 0.04em;
    pointer-events: none;
    opacity: 0;
    transition: none;
    text-shadow: 0 0 30px currentColor;
    text-align: center;
}
#feedback.perfekt { color: #44ffaa; }
#feedback.dobre   { color: #ffdd44; }
#feedback.miss    { color: #ff4455; }

/* Bottom controls */
#bottomArea {
    position: fixed;
    bottom: 0;
    left: 0;
    right: 0;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding-bottom: 28px;
    gap: 20px;
    pointer-events: none;
}


/* Start/Stop button */
#startBtn {
    pointer-events: all;
    background: linear-gradient(135deg, #6600cc, #aa00ff);
    border: none;
    color: #fff;
    font-size: 18px;
    font-weight: 800;
    padding: 14px 48px;
    border-radius: 50px;
    cursor: pointer;
    letter-spacing: 0.05em;
    box-shadow: 0 4px 30px rgba(150,0,255,0.45);
}
#startBtn:hover { background: linear-gradient(135deg, #7a00ee, #cc00ff); }
#startBtn.running {
    background: linear-gradient(135deg, #cc0044, #ff0066);
    box-shadow: 0 4px 30px rgba(255,0,80,0.45);
}

#countdown {
    position: fixed;
    inset: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 140px;
    font-weight: 900;
    color: #fff;
    text-shadow: 0 0 60px rgba(200,80,255,0.9);
    pointer-events: none;
    opacity: 0;
}
#modelStatus {
    position: fixed;
    top: 50%;
    left: 50%;
    transform: translate(-50%,-50%);
    font-size: 16px;
    color: #9070b0;
    pointer-events: none;
}
#sectionAnnounce {
    position: fixed;
    left: 50%;
    top: 22%;
    transform: translate(-50%, -50%);
    font-size: 36px;
    font-weight: 900;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    pointer-events: none;
    opacity: 0;
    transition: opacity 0.4s ease;
    text-shadow: 0 0 30px rgba(200,80,255,0.9);
}
#songProgress {
    position: fixed;
    top: 0; left: 0; right: 0;
    height: 3px;
    background: rgba(100,0,160,0.25);
    pointer-events: none;
}
#songProgressFill {
    height: 100%;
    background: linear-gradient(90deg, #6600cc, #ff44cc);
    width: 0%;
    transition: width 0.4s linear;
}
</style>

<body>

<canvas id="gc"></canvas>
<video id="vid" autoplay playsinline muted></video>

<div id="hud">
    <div id="topBar">
        <div id="trackBlock">
            <div id="trackLabel">Track</div>

<script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs-core@4.9.0/dist/tf-core.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs-converter@4.9.0/dist/tf-converter.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs-backend-webgl@4.9.0/dist/tf-backend-webgl.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@tensorflow-models/pose-detection@2.1.0/dist/pose-detection.min.js"></script>

<script>
// ── MoveNet keypoint indices ───────────────────────────────────────────
const KP = {
    leftShoulder:5, rightShoulder:6, leftHip:11, rightHip:12,
    leftKnee:13, rightKnee:14, leftAnkle:15, rightAnkle:16,
};
const SKEL = [
    [5,6],[5,7],[6,8],[7,9],[8,10],[5,11],[6,12],[11,12],
    [11,13],[12,14],[13,15],[14,16],
];

// ── JumpDetector (live thresholds — copied from debug.html) ────────────
class JumpDetector {
    TIME_MIN  = 100;
    TIME_MAX  = 650;
    MIN_SCORE = 0.25;
    h = [];
    d = [];
    hipUpDrvInt   = 0;
    hipDownDrvInt = 0;
    KhipdiffTopLimitSet = false;
    dbg = { KhipDrv:0, Khipdiff:0, timeUp:0, timeDown:0, ratio:0, reject:'', hipy:0, dhipyAvg:0, style:'' };

    _sum(arr, key, n) {
        const len = Math.min(arr.length, n);
        let s = 0;
        for (let i = 0; i < len; i++) s += arr[i][key];
        return s;
    }

    reset() {
        this.h = []; this.d = [];
        this.hipUpDrvInt = 0; this.hipDownDrvInt = 0;
        this.KhipdiffTopLimitSet = false;
    }

    detect(keypoints) {
        const lh = keypoints[KP.leftHip],      rh = keypoints[KP.rightHip];
        const ls = keypoints[KP.leftShoulder],  rs = keypoints[KP.rightShoulder];
        const la = keypoints[KP.leftAnkle],     ra = keypoints[KP.rightAnkle];
        const lk = keypoints[KP.leftKnee],      rk = keypoints[KP.rightKnee];

        const minScore = Math.min(lh.score, rh.score, ls.score, rs.score);
        if (minScore < this.MIN_SCORE) return false;

        const p = 5;
        const m = Math.max(ra.y, la.y) - (ls.y + rs.y) / 2;

        const dL = lh.y - lk.y, dR = rh.y - rk.y;
        if (dL > 0 && dR > 0 && Math.max(dL/Math.max(dR,1e-9), dR/Math.max(dL,1e-9)) > 1.1)
            this.KhipdiffTopLimitSet = 2.2;

        this.h.unshift({
            hipy:0, dhipy:0, dhipyavg:0,
            hiply:lh.y, hipry:rh.y, shly:ls.y, shry:rs.y,
            knly:lk.y, knry:rk.y, anly:la.y, anry:ra.y,
            time: Date.now(),
        });
        this.h[0].hipy     = (lh.y + rh.y + ls.y + rs.y) / 4;
        this.h[0].dhipy    = this.h[1] ? this.h[0].hipy - this.h[1].hipy : 0;
        this.h[0].dhipyavg = this._sum(this.h, 'dhipy', p) / p;
        if (this.h.length >= 60) this.h.pop();

        for (const e of this.d) e.frame++;

        const cur  = this.h[0].dhipyavg;
        const prev = this.h[1] ? this.h[1].dhipyavg : 0;
        let jumped = false;

        this.dbg.hipy     = +this.h[0].hipy.toFixed(3);
        this.dbg.dhipyAvg = +cur.toFixed(4);
        this.dbg.reject   = '';

        if (Math.sign(cur) < Math.sign(prev)) {
            if (this.d[0]) {
                let pv=0, pf=0; this.hipDownDrvInt=0;
                for (let e=1; e<=this.d[0].frame; e++) {
                    if (this.h[e]) {
                        if (this.h[e].dhipyavg > pv) { pv=this.h[e].dhipyavg; pf=e; }
                        this.hipDownDrvInt += this.h[e].dhipyavg;
                    }
                }
                this.d.unshift({type:3, frame:pf, value:pv});
            }
            this.d.unshift({type:0, frame:0, time:Date.now()});

            let tUp=0, tDown=0;
            if (this.d[4]) { tUp=this.d[2].time-this.d[4].time; tDown=this.d[0].time-this.d[2].time; }
            const Kr   = tUp / Math.max(tDown, 1);
            const tOk  = (tUp+tDown) > 2*this.TIME_MIN;
            const tLim = (tUp+tDown) < 2*this.TIME_MAX;
            const Kd   = Math.abs(this.hipDownDrvInt / (this.hipUpDrvInt||1));
            const Klim = this.KhipdiffTopLimitSet || 2.5;
            const Kdrv = (this.hipDownDrvInt-this.hipUpDrvInt) / ((tUp+tDown||1)*30*Math.max(m,1e-6)) * 1e7;

            this.dbg.KhipDrv  = +Kdrv.toFixed(1);
            this.dbg.Khipdiff = +Kd.toFixed(3);
            this.dbg.timeUp   = tUp;
            this.dbg.timeDown = tDown;
            this.dbg.ratio    = +Kr.toFixed(2);

            if (10<Kdrv && Kdrv<500 && tOk && tLim && 0.15<Kd && Kd<Klim && 0.35<Kr && Kr<2.0) {
                this.KhipdiffTopLimitSet = false;
                let abort=false, reason='';
                const legL=(lk.y-lh.y)/Math.max(la.y-lh.y,0.001)*m*1e3;
                const legR=(rk.y-rh.y)/Math.max(ra.y-rh.y,0.001)*m*1e3;
                if (legL<10||legR<10)   { abort=true; reason=`legs`; }
                if (!abort && (lh.y>lk.y||lh.y>la.y||rh.y>rk.y||rh.y>ra.y)) { abort=true; reason='leg_above_hip'; }
                if (!abort && (lh.y-ls.y>0.30||rh.y-rs.y>0.30)) { abort=true; reason='body_big'; }
                if (!abort && (lh.y-ls.y<0.03||rh.y-rs.y<0.03)) { abort=true; reason='body_small'; }
                if (!abort) {
                    jumped = true;
                    const ankleDiff = la.y - ra.y;
                    const diffNorm  = Math.abs(ankleDiff) / Math.max(m, 0.01);
                    this.dbg.style  = diffNorm < 0.05 ? 'snozmo'
                                    : ankleDiff < 0   ? 'right'
                                    : 'left';
                }
                else { this.dbg.reject = reason; }
            } else {
                if      (!(10<Kdrv&&Kdrv<500))   this.dbg.reject=`KDrv`;
                else if (!tOk)                    this.dbg.reject=`tShort`;
                else if (!tLim)                   this.dbg.reject=`tLong`;
                else if (!(0.15<Kd&&Kd<Klim))    this.dbg.reject=`Kdiff`;
                else                              this.dbg.reject=`Kratio`;
            }
        }

        if (Math.sign(cur) > Math.sign(prev)) {
            if (this.d[0]) {
                let pv=0, pf=0; this.hipUpDrvInt=0;
                for (let e=1; e<=this.d[0].frame; e++) {
                    if (this.h[e]) {
                        if (this.h[e].dhipyavg < pv) { pv=this.h[e].dhipyavg; pf=e; }
                        this.hipUpDrvInt += this.h[e].dhipyavg;
                    }
                }
                this.d.unshift({type:1, frame:pf, value:pv});
            }
            this.d.unshift({type:2, frame:0, time:Date.now()});
        }
        if (8 < this.d.length) this.d.pop();

        return jumped;
    }
}

// ── Wrecking Ball song data ────────────────────────────────────────────
const WB_SECTIONS = [
    { name: 'Intro',        bars:  8, bpm:  90, type: 'intro'  },
    { name: 'Verse',        bars: 16, bpm: 110, type: 'verse'  },
    { name: 'Pre-Chorus',   bars:  8, bpm: 130, type: 'pre'    },
    { name: 'Chorus',       bars: 16, bpm: 150, type: 'chorus' },
    { name: 'Verse 2',      bars:  8, bpm: 110, type: 'verse'  },
    { name: 'Pre-Chorus 2', bars:  8, bpm: 130, type: 'pre'    },
    { name: 'Chorus 2',     bars: 16, bpm: 150, type: 'chorus' },
    { name: 'Bridge',       bars:  8, bpm:  90, type: 'bridge' },
    { name: 'Final Chorus', bars: 16, bpm: 160, type: 'chorus' },
    { name: 'Outro',        bars:  4, bpm: 110, type: 'outro'  },
];

// Piano arpeggios per chord (8th notes, 8 values per bar): C G Am F
const WB_ARPS = [
    [261.6, 329.6, 392.0, 329.6, 261.6, 329.6, 392.0, 329.6],
    [196.0, 246.9, 293.7, 246.9, 196.0, 246.9, 293.7, 246.9],
    [220.0, 261.6, 329.6, 261.6, 220.0, 261.6, 329.6, 261.6],
    [174.6, 220.0, 261.6, 220.0, 174.6, 220.0, 261.6, 220.0],
];
// Bass per chord (4 beats): C G Am F
const WB_BASS = [
    [ 65.4,  65.4,  98.0,  82.4],
    [ 98.0,  98.0, 146.8, 123.5],
    [110.0, 110.0, 164.8, 130.8],
    [ 87.3,  87.3, 130.8, 110.0],
];
// Pad chords: C G Am F
const WB_PADS = [
    [261.6, 329.6, 392.0],
    [196.0, 246.9, 293.7],
    [220.0, 261.6, 329.6],
    [174.6, 220.0, 261.6],
];

// Lead melody: quarter-note freq per beat (0 = rest)
// Index = barInPhrase*4 + beatInBar  (8-bar phrases = 32 entries)
const WB_CHORUS_MEL = [
    659.3, 587.3, 523.3, 587.3,   // bar 0  C
    659.3,     0, 523.3, 587.3,   // bar 1  G
    659.3, 587.3, 523.3, 493.9,   // bar 2  Am
    523.3,     0, 440.0,     0,   // bar 3  F
    392.0, 440.0, 523.3, 587.3,   // bar 4  C
    659.3,     0, 587.3, 523.3,   // bar 5  G
    659.3, 587.3, 523.3, 493.9,   // bar 6  Am
    523.3,     0,     0,     0,   // bar 7  F
];
const WB_PRE_MEL = [
    523.3, 523.3, 587.3, 587.3,
    587.3, 587.3, 659.3, 659.3,
    659.3,     0, 587.3,     0,
    523.3,     0,     0,     0,
    659.3, 587.3, 523.3, 587.3,
    659.3,     0, 493.9, 523.3,
    440.0, 523.3, 659.3,     0,
    587.3,     0, 523.3,     0,
];
const WB_BRIDGE_MEL = [
    523.3,     0, 440.0,     0,
    493.9,     0, 392.0,     0,
    440.0,     0, 392.0,     0,
    349.2,     0,     0,     0,
    659.3,     0, 587.3,     0,
    523.3,     0, 493.9,     0,
    440.0,     0,     0,     0,
    349.2,     0,     0,     0,
];

function wbGetSection(bar) {
    let cum = 0;
    for (let i = 0; i < WB_SECTIONS.length; i++) {
        const s = WB_SECTIONS[i];
        if (bar < cum + s.bars) return { ...s, idx: i, barInSection: bar - cum };
        cum += s.bars;
    }
    return null;
}

// ── BeatEngine ────────────────────────────────────────────────────────
class BeatEngine {
    constructor(startBpm, onBeat, trackId = 0) {
        this.startBpm        = startBpm;
        this.bpm             = startBpm;
        this.onBeat          = onBeat;
        this.onSectionChange = null;
        this.trackId         = trackId;
        this.audioCtx        = null;
        this.next16th        = 0;
        this.pos16           = 0;
        this.beatIndex       = 0;
        this._timerId        = null;
        this.running         = false;
        // WB song state
        this._wbBar          = 0;
        this._wbSectionIdx   = -1;
        this._wbBarInSection = 0;
    }

    get beatSec() { return 60 / this.bpm; }
    get s16()     { return this.beatSec / 4; }

    start() {
        this.audioCtx  = new (window.AudioContext || window.webkitAudioContext)();
        this.bpm       = this.startBpm;
        this.next16th  = this.audioCtx.currentTime + 0.05;
        this.pos16     = 0;
        this.beatIndex = 0;
        this.running   = true;
        this._schedule();
    }

    stop() {
        this.running = false;
        clearTimeout(this._timerId);
        if (this.audioCtx) { this.audioCtx.close(); this.audioCtx = null; }
    }

    _schedule() {
        if (!this.running) return;
        const ac = this.audioCtx;
        while (this.next16th < ac.currentTime + LOOKAHEAD_MS / 1000 + 0.08) {
            const pos  = this.pos16;
            const beat = this.beatIndex;
            const when = this.next16th;

            // WB: track bar / section changes at bar boundary
            if (this.trackId === 1 && pos === 0) {
                const info = wbGetSection(this._wbBar);
                if (info) {
                    if (info.idx !== this._wbSectionIdx) {
                        this._wbSectionIdx = info.idx;
                        this.bpm           = info.bpm;
                        if (this.onSectionChange) this.onSectionChange(info);
                        updateBpmDisplay(info.bpm);
                    }
                    this._wbBarInSection = info.barInSection;
                } else if (this._wbSectionIdx !== -99) {
                    this._wbSectionIdx = -99;
                    if (this.onSectionChange) this.onSectionChange(null); // song ended
                }
                this._wbBar++;
            }

            // Fire game beat callback on every beat
            if (pos % 4 === 0) {
                const perfMs = performance.now() + (when - ac.currentTime) * 1000;
                this.onBeat(beat, perfMs);
                // Groove track: auto-speed every 32 beats
                if (this.trackId === 0 && beat > 0 && beat % 32 === 0) {
                    const max = this.startBpm + 40;
                    this.bpm  = this.bpm < max ? Math.min(this.bpm + 5, max) : this.startBpm;
                    updateBpmDisplay(this.bpm);
                }
            }

            this._play16th(when, pos, beat);

            this.next16th += this.s16;
            this.pos16     = (this.pos16 + 1) % 16;
            if (pos % 4 === 3) this.beatIndex++;
        }
        this._timerId = setTimeout(() => this._schedule(), 20);
    }

    _play16th(when, pos, beat) {
        if (this.trackId === 1) { this._play16th_wb(when, pos, beat); return; }

        const barBeat = beat % 16;
        const bar     = Math.floor(barBeat / 4);

        // ── Kick: beat 1 (pos 0) and beat 3 (pos 8) ──
        if (pos === 0) this._kick(when, 0.9);
        if (pos === 8) this._kick(when, 0.72);

        // ── Snare: beat 2 (pos 4) and beat 4 (pos 12) ──
        if (pos === 4 || pos === 12) this._snare(when);

        // ── Closed hi-hat: every 8th note; accent on beats ──
        if (pos % 2 === 0) {
            const onBeat = (pos % 4 === 0);
            this._hihat(when, false, onBeat ? (pos === 0 ? 0.42 : 0.30) : 0.22);
        }
        if (pos === 6 || pos === 14) this._hihat(when, true, 0.36);

        // ── Bass ──
        if (pos % 4 === 0) {
            const bass = [
                110.0, 110.0, 164.8, 146.8,
                130.8, 130.8, 196.0, 164.8,
                110.0, 130.8, 164.8, 220.0,
                196.0, 174.6, 164.8, 110.0,
            ];
            this._bass(when, bass[barBeat], this.beatSec * 0.82);
        }

        // ── Pad ──
        if (pos === 0) {
            const pads = [
                [220.0, 261.6, 329.6],
                [174.6, 220.0, 261.6],
                [261.6, 329.6, 392.0],
                [196.0, 246.9, 293.7],
            ];
            this._pad(when, pads[bar], this.beatSec * 4 * 0.88);
        }
    }

    // ── Wrecking Ball — full song, section-aware ──────────────────────
    _play16th_wb(when, pos, beat) {
        if (this._wbSectionIdx < 0 || this._wbSectionIdx === -99) return;
        const sec  = WB_SECTIONS[this._wbSectionIdx];
        const type = sec.type;
        const barS = this._wbBarInSection;   // bar within current section
        const chord = barS % 4;              // 0=C 1=G 2=Am 3=F

        // ── Piano arpeggio (8th notes) ──────────────────────────────
        if (pos % 2 === 0) {
            const vol = type === 'chorus' ? 0.36
                      : type === 'bridge' ? 0.22
                      : type === 'intro'  ? 0.28 : 0.26;
            this._piano(when, WB_ARPS[chord][pos / 2], this.beatSec * 0.40, vol);
        }

        // ── Drums ───────────────────────────────────────────────────
        if (type !== 'intro' && type !== 'bridge') {
            const big = (type === 'chorus');
            if (pos === 0) this._kick(when, big ? 0.90 : 0.75);
            if (pos === 8) this._kick(when, big ? 0.72 : 0.60);
            if (pos === 4 || pos === 12) this._snare(when);
            // Hi-hats: 8ths + 16ths in chorus/pre
            if (pos % 2 === 0) this._hihat(when, false, big ? 0.28 : 0.20);
            if (big && pos % 2 === 1) this._hihat(when, false, 0.12);  // extra 16ths in chorus
            if ((big || type === 'pre') && (pos === 6 || pos === 14))
                this._hihat(when, true, 0.34);
        }

        // ── Bass ────────────────────────────────────────────────────
        if (pos % 4 === 0) {
            const vol = type === 'chorus' ? 0.55
                      : type === 'intro'  ? 0.28
                      : type === 'bridge' ? 0.30 : 0.42;
            this._bass(when, WB_BASS[chord][pos / 4], this.beatSec * 0.82, vol);
        }

        // ── Pad ─────────────────────────────────────────────────────
        if (pos === 0) {
            const vol = type === 'chorus' ? 0.062
                      : type === 'bridge' ? 0.030
                      : type === 'intro'  ? 0.038 : 0.048;
            this._pad(when, WB_PADS[chord], this.beatSec * 4 * 0.88, vol);
        }

        // ── Lead melody (quarter notes) ─────────────────────────────
        if (pos % 4 === 0) {
            const b   = pos / 4;                    // beat within bar (0-3)
            const idx = (barS % 8) * 4 + b;        // position in 8-bar phrase (0-31)
            let melF  = 0, melV = 0;

            if (type === 'chorus') {
                melF = WB_CHORUS_MEL[idx % 32]; melV = 0.46;
            } else if (type === 'pre') {
                melF = WB_PRE_MEL[idx % 32];   melV = 0.38;
            } else if (type === 'bridge') {
                melF = WB_BRIDGE_MEL[idx % 32]; melV = 0.34;
            }
            if (melF > 0) this._piano(when, melF, this.beatSec * 0.88, melV);
        }
    }

    _kick(when, vol) {
        const ac = this.audioCtx;
        const osc = ac.createOscillator(), env = ac.createGain();
        osc.connect(env); env.connect(ac.destination);
        osc.frequency.setValueAtTime(130, when);
        osc.frequency.exponentialRampToValueAtTime(0.01, when + 0.28);
        env.gain.setValueAtTime(vol, when);
        env.gain.exponentialRampToValueAtTime(0.001, when + 0.28);
        osc.start(when); osc.stop(when + 0.28);
    }

    _snare(when) {
        const ac  = this.audioCtx;
        const len = Math.floor(ac.sampleRate * 0.18);
        const buf = ac.createBuffer(1, len, ac.sampleRate);
        const d   = buf.getChannelData(0);
        for (let i = 0; i < len; i++) d[i] = Math.random() * 2 - 1;
        const ns = ac.createBufferSource(); ns.buffer = buf;
        const nf = ac.createBiquadFilter(); nf.type = 'bandpass'; nf.frequency.value = 2800; nf.Q.value = 0.6;
        const ne = ac.createGain();
        ne.gain.setValueAtTime(0.5, when); ne.gain.exponentialRampToValueAtTime(0.001, when + 0.18);
        ns.connect(nf); nf.connect(ne); ne.connect(ac.destination);
        ns.start(when); ns.stop(when + 0.18);
        const osc = ac.createOscillator(), oe = ac.createGain();
        osc.frequency.value = 180;
        oe.gain.setValueAtTime(0.32, when); oe.gain.exponentialRampToValueAtTime(0.001, when + 0.07);
        osc.connect(oe); oe.connect(ac.destination);
        osc.start(when); osc.stop(when + 0.07);
    }

    _hihat(when, open, vol) {
        const ac  = this.audioCtx;
        const dur = open ? 0.13 : 0.032;
        const len = Math.floor(ac.sampleRate * dur);
        const buf = ac.createBuffer(1, len, ac.sampleRate);
        const d   = buf.getChannelData(0);
        for (let i = 0; i < len; i++) d[i] = Math.random() * 2 - 1;
        const src = ac.createBufferSource(); src.buffer = buf;
        const fil = ac.createBiquadFilter(); fil.type = 'highpass'; fil.frequency.value = open ? 5500 : 9500;
        const env = ac.createGain();
        env.gain.setValueAtTime(vol, when); env.gain.exponentialRampToValueAtTime(0.001, when + dur);
        src.connect(fil); fil.connect(env); env.connect(ac.destination);
        src.start(when); src.stop(when + dur);
    }

    _bass(when, freq, dur, vol = 0.5) {
        const ac  = this.audioCtx;
        const osc = ac.createOscillator(); osc.type = 'sawtooth'; osc.frequency.value = freq;
        const fil = ac.createBiquadFilter(); fil.type = 'lowpass';
        fil.frequency.setValueAtTime(700, when);
        fil.frequency.exponentialRampToValueAtTime(140, when + dur * 0.45);
        const env = ac.createGain();
        env.gain.setValueAtTime(0, when);
        env.gain.linearRampToValueAtTime(vol, when + 0.018);
        env.gain.exponentialRampToValueAtTime(0.001, when + dur);
        osc.connect(fil); fil.connect(env); env.connect(ac.destination);
        osc.start(when); osc.stop(when + dur);
    }

    _pad(when, freqs, dur, vol = 0.052) {
        const ac = this.audioCtx;
        for (const freq of freqs) {
            for (const det of [-7, 7]) {
                const osc = ac.createOscillator(); osc.type = 'sine';
                osc.frequency.value = freq; osc.detune.value = det;
                const env = ac.createGain();
                env.gain.setValueAtTime(0, when);
                env.gain.linearRampToValueAtTime(vol, when + 0.45);
                env.gain.setValueAtTime(vol, when + dur - 0.45);
                env.gain.linearRampToValueAtTime(0, when + dur);
                osc.connect(env); env.connect(ac.destination);
                osc.start(when); osc.stop(when + dur);
            }
        }
    }

    _piano(when, freq, dur, vol = 0.35) {
        const ac   = this.audioCtx;
        const osc1 = ac.createOscillator(); osc1.type = 'triangle'; osc1.frequency.value = freq;
        const osc2 = ac.createOscillator(); osc2.type = 'sine';     osc2.frequency.value = freq * 2;
        const mix  = ac.createGain(); mix.gain.value = 0.28;
        const env  = ac.createGain();
        env.gain.setValueAtTime(0, when);
        env.gain.linearRampToValueAtTime(vol, when + 0.007);
        env.gain.exponentialRampToValueAtTime(0.001, when + Math.max(dur, 0.08));
        osc1.connect(env);
        osc2.connect(mix); mix.connect(env);
        env.connect(ac.destination);
        osc1.start(when); osc1.stop(when + dur + 0.02);
        osc2.start(when); osc2.stop(when + dur + 0.02);
    }
}

// ── GameController ────────────────────────────────────────────────────
class GameController {
    constructor() {
        this.reset();
    }

    reset() {
        this.score   = 0;
        this.combo   = 0;
        this.beats   = [];   // { expectedMs, scored }
        this.lastResult = null;
        this.resultExpiry = 0;
    }

    onBeat(beatIndex, expectedMs) {
        this.beats.push({ expectedMs, scored: false, beatIndex });
        // Clean up old beats (> 600ms in the past = missed)
        const now = performance.now();
        for (const b of this.beats) {
            if (!b.scored && now - b.expectedMs > 600) {
                b.scored = true;
                this._applyMiss();
            }
        }
        // Keep array small
        if (this.beats.length > 20) this.beats.splice(0, this.beats.length - 20);
    }

    onJump(jumpMs) {
        // Find nearest unscored beat within ±300ms
        let best = null, bestDist = 300;
        for (const b of this.beats) {
            if (b.scored) continue;
            const dist = Math.abs(jumpMs - b.expectedMs);
            if (dist < bestDist) { best = b; bestDist = dist; }
        }

        if (!best) {
            // Jump outside any window — count as miss
            this._applyMiss();
            return;
        }
        best.scored = true;

        if (bestDist <= 100) {
            this._apply('PERFEKT', 100);
        } else {
            this._apply('DOBŘE', 50);
        }
    }

    _apply(label, pts) {
        this.combo++;
        const multiplier = this.combo >= 8 ? 4
                         : this.combo >= 5 ? 3
                         : this.combo >= 3 ? 2 : 1;
        this.score += pts * multiplier;
        this.lastResult   = label;
        this.resultExpiry = performance.now() + 600;
    }

    _applyMiss() {
        this.combo = 0;
        this.lastResult   = 'MISS';
        this.resultExpiry = performance.now() + 400;
    }

    multiplier() {
        return this.combo >= 8 ? 4 : this.combo >= 5 ? 3 : this.combo >= 3 ? 2 : 1;
    }
}

// ── DOM refs ──────────────────────────────────────────────────────────
const gc         = document.getElementById('gc');
const ctx        = gc.getContext('2d');
const vid        = document.getElementById('vid');
const bpmSelect  = document.getElementById('bpmSelect');
const startBtn   = document.getElementById('startBtn');
const feedbackEl = document.getElementById('feedback');
const cdEl       = document.getElementById('countdown');
const scoreEl    = document.getElementById('scoreVal');
const comboEl    = document.getElementById('comboVal');
const statusEl   = document.getElementById('modelStatus');

// ── State ─────────────────────────────────────────────────────────────
let poseDetector = null;
let jd           = new JumpDetector();
let gc_          = new GameController();
let beatEngine   = null;
let gameRunning  = false;
let latestKps    = null;
let poseRunning  = false;
let videoRect    = { x:0, y:0, w:1, h:1 };
let cameraStream = null;
let currentBeatIndex = -1;
let lastBeatPerfNow  = 0;
let selectedTrack    = 0;
let fallingBlocks    = [];  // { targetMs, scored, hitResult, hitAt }

// ── Camera ────────────────────────────────────────────────────────────
async function startCamera() {
    try {
        cameraStream = await navigator.mediaDevices.getUserMedia({
            video: { facingMode: 'user', width: { ideal: 1280 }, height: { ideal: 720 } },
            audio: false,
        });
        vid.srcObject = cameraStream;
        await vid.play();
        computeVideoRect();
    } catch (err) {
        statusEl.textContent = 'Chyba kamery: ' + err.message;
    }
}

function computeVideoRect() {
    const W = gc.width  = gc.offsetWidth;
    const H = gc.height = gc.offsetHeight;
    const vW = vid.videoWidth  || W;
    const vH = vid.videoHeight || H;
    const scale = Math.min(W/vW, H/vH);
    const dW = vW*scale, dH = vH*scale;
    videoRect = { x:(W-dW)/2, y:(H-dH)/2, w:dW, h:dH };
}
window.addEventListener('resize', computeVideoRect);

// ── TF.js / MoveNet ──────────────────────────────────────────────────
async function initDetector() {
    tf.ENV.set('WEBGL_PACK', false);
    await tf.ready();
    await tf.setBackend('webgl');
    poseDetector = await poseDetection.createDetector(
        poseDetection.SupportedModels.MoveNet,
        {
            modelType: poseDetection.movenet.modelType.SINGLEPOSE_LIGHTNING,
            enableTracking: false,
            modelUrl: '/app/svihej-camapp/v2025-july-mux/dist/tfjs-movenet/model.json',
        }
    );
    statusEl.style.display = 'none';
}

// ── Pose loop ─────────────────────────────────────────────────────────
async function poseLoop() {
    requestAnimationFrame(poseLoop);
    if (poseRunning || !poseDetector || vid.readyState < 2) return;
    poseRunning = true;
    try {
        const poses = await poseDetector.estimatePoses(vid, { flipHorizontal: false });
        if (poses.length > 0) {
            const vW = vid.videoWidth || 640, vH = vid.videoHeight || 480;
            latestKps = poses[0].keypoints.map(kp => ({ ...kp, x: kp.x/vW, y: kp.y/vH }));
        }
    } catch(_) {}
    poseRunning = false;
}

// ── Skeleton drawing ──────────────────────────────────────────────────
function drawSkeleton(kps, vr, alpha) {
    const sx = kp => (1 - kp.x) * vr.w + vr.x;
    const sy = kp => kp.y * vr.h + vr.y;
    ctx.save();
    ctx.globalAlpha = alpha * 0.85;
    ctx.lineCap = 'round';
    for (const [a,b] of SKEL) {
        const pa=kps[a], pb=kps[b];
        if (!pa||!pb||pa.score<0.3||pb.score<0.3) continue;
        ctx.strokeStyle = 'rgba(160,100,255,0.9)';
        ctx.lineWidth   = Math.max(1.5, vr.w*0.003);
        ctx.beginPath();
        ctx.moveTo(sx(pa), sy(pa));
        ctx.lineTo(sx(pb), sy(pb));
        ctx.stroke();
    }
    for (let i=0; i<kps.length; i++) {
        const kp=kps[i];
        if (!kp||kp.score<0.3) continue;
        ctx.beginPath();
        ctx.arc(sx(kp), sy(kp), Math.max(3, vr.w*0.005), 0, Math.PI*2);
        ctx.fillStyle = i<5 ? 'rgba(255,220,50,0.95)' : 'rgba(160,100,255,0.9)';
        ctx.fill();
    }
    ctx.restore();
}

// ── Game start / stop ─────────────────────────────────────────────────
async function startGame() {
    if (gameRunning) return;
    const bpm = parseInt(bpmSelect.value, 10);
    startBtn.disabled = true;

    // Countdown 3-2-1
    cdEl.style.opacity = '1';
    for (const n of ['3','2','1','GO!']) {
        cdEl.textContent = n;
        await sleep(n === 'GO!' ? 700 : 900);
    }
    cdEl.style.opacity = '0';

    jd.reset();
    gc_.reset();
    gameRunning = true;
    startBtn.textContent = 'STOP';
    startBtn.classList.add('running');
    startBtn.disabled = false;

    const startBpm = selectedTrack === 1 ? WB_SECTIONS[0].bpm : parseInt(bpmSelect.value, 10);
    beatEngine = new BeatEngine(startBpm, (beatIndex, perfMs) => {
        gc_.onBeat(beatIndex, perfMs);
        fallingBlocks.push({ targetMs: perfMs, scored: false, hitResult: null, hitAt: 0 });
    }, selectedTrack);

    if (selectedTrack === 1) {
        // Pre-compute total WB song duration in beats for progress bar
        const wbTotalBeats = WB_SECTIONS.reduce((s, sec) => s + sec.bars * 4, 0);
        beatEngine.onSectionChange = (info) => {
            if (!info) { stopGame(); return; }  // song ended
            showSectionAnnounce(info.name, info.type);
            updateBpmDisplay(info.bpm);
            // Update song progress
            let cumBeats = 0;
            for (let i = 0; i < info.idx; i++) cumBeats += WB_SECTIONS[i].bars * 4;
            const pct = cumBeats / wbTotalBeats * 100;
            document.getElementById('songProgressFill').style.width = pct + '%';
        };
    }
    beatEngine.start();
}

function stopGame() {
    if (!gameRunning) return;
    gameRunning = false;
    if (beatEngine) { beatEngine.stop(); beatEngine = null; }
    startBtn.textContent = 'START';
    startBtn.classList.remove('running');
    currentBeatIndex = -1;
    lastBeatPerfNow  = 0;
    fallingBlocks    = [];
    document.getElementById('bpmLive').textContent = '';
    document.getElementById('songProgressFill').style.width = '0%';
    document.getElementById('sectionAnnounce').style.opacity = '0';
}

bpmSelect.addEventListener('change', () => {
    const newBpm = parseInt(bpmSelect.value, 10);
    if (gameRunning && beatEngine) {
        beatEngine.startBpm = newBpm;
        beatEngine.bpm      = newBpm;
        updateBpmDisplay(newBpm);
    }
});

startBtn.addEventListener('click', () => {
    if (gameRunning) stopGame();
    else startGame();
});

function sleep(ms) { return new Promise(r => setTimeout(r, ms)); }

// Track selector
document.querySelectorAll('.track-btn').forEach(btn => {
    btn.addEventListener('click', () => {
        document.querySelectorAll('.track-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        selectedTrack = parseInt(btn.dataset.track, 10);
        bpmSelect.disabled = (selectedTrack === 1);
        if (beatEngine) beatEngine.trackId = selectedTrack;
    });
});

let _sectionAnnounceTimer = null;
function showSectionAnnounce(name, type) {
    const el = document.getElementById('sectionAnnounce');
    const colors = { intro:'#a080ff', verse:'#80c0ff', pre:'#ffdd44', chorus:'#ff88ff', bridge:'#44ffcc', outro:'#a0a0ff' };
    el.textContent  = name;
    el.style.color  = colors[type] || '#fff';
    el.style.opacity = '1';
    el.style.fontSize = type === 'chorus' ? '44px' : '32px';
    clearTimeout(_sectionAnnounceTimer);
    _sectionAnnounceTimer = setTimeout(() => { el.style.opacity = '0'; }, 2500);
}

function updateBpmDisplay(bpm) {
    document.getElementById('bpmLive').textContent = `→ ${Math.round(bpm)} BPM`;
}

// ── Render loop ───────────────────────────────────────────────────────
let lastJumpFlash = 0;

function renderLoop() {
    requestAnimationFrame(renderLoop);

    const W = gc.offsetWidth, H = gc.offsetHeight;
    if (gc.width !== W || gc.height !== H) { gc.width=W; gc.height=H; computeVideoRect(); }

    const vr = videoRect;

    // Black + camera
    ctx.fillStyle = '#04000c';
    ctx.fillRect(0, 0, W, H);
    if (vid.readyState >= 2) {
        ctx.save();
        ctx.scale(-1, 1);
        ctx.drawImage(vid, -(vr.x + vr.w), vr.y, vr.w, vr.h);
        ctx.restore();
    }

    // Detect pose + jump
    if (latestKps) {
        const jumped = jd.detect(latestKps);

        if (jumped) {
            lastJumpFlash = performance.now();
            if (gameRunning) {
                const jnow = performance.now();
                gc_.onJump(jnow);
                // Mark nearest unscored GH block
                let best = null, bestDist = 350;
                for (const b of fallingBlocks) {
                    if (b.scored) continue;
                    const dist = Math.abs(jnow - b.targetMs);
                    if (dist < bestDist) { best = b; bestDist = dist; }
                }
                if (best) {
                    best.scored   = true;
                    best.hitResult = bestDist <= 100 ? 'perfekt' : 'dobre';
                    best.hitAt    = jnow;
                }
            }
        }

        const flashAge = performance.now() - lastJumpFlash;
        const skAlpha  = flashAge < 150 ? 1.0 : 0.55;
        drawSkeleton(latestKps, vr, skAlpha);

        // Flash ring on jump
        if (flashAge < 200) {
            ctx.save();
            ctx.globalAlpha = 1 - flashAge/200;
            ctx.strokeStyle = '#cc66ff';
            ctx.lineWidth = 6;
            const cx = W/2, cy = H/2;
            const r  = 60 + flashAge * 0.5;
            ctx.beginPath(); ctx.arc(cx, cy, r, 0, Math.PI*2); ctx.stroke();
            ctx.restore();
        }
    }

    // Update score / combo UI
    if (gameRunning) {
        scoreEl.textContent = gc_.score;
        const m = gc_.multiplier();
        comboEl.textContent = gc_.combo >= 3 ? `×${m}  combo ${gc_.combo}` : '';
    }

    // Feedback flash
    const now = performance.now();
    if (gc_.lastResult && now < gc_.resultExpiry) {
        const age = now - (gc_.resultExpiry - 600);
        const alpha = Math.max(0, 1 - age / 500);
        feedbackEl.style.opacity = alpha.toFixed(2);
        feedbackEl.textContent   = gc_.lastResult;
        feedbackEl.className     = gc_.lastResult === 'PERFEKT' ? 'perfekt'
                                 : gc_.lastResult === 'DOBŘE'   ? 'dobre'
                                 : 'miss';
    } else {
        feedbackEl.style.opacity = '0';
    }

    // Guitar Hero lane
    if (gameRunning) {
        // Derive lastBeatPerfNow: most recently passed beat time
        for (const b of fallingBlocks) {
            if (b.targetMs <= now && b.targetMs > lastBeatPerfNow) lastBeatPerfNow = b.targetMs;
        }
        drawGHLane(ctx, W, H, now);
    }
}

// ── Guitar Hero lane ─────────────────────────────────────────────────
const LOOKAHEAD_MS = 2000;
const GH_LANE_W    = 140;
const GH_BLOCK_W   = 96;
const GH_BLOCK_H   = 30;

function drawGHLane(ctx, W, H, now) {
    const laneX  = W / 2 - GH_LANE_W / 2;
    const laneY  = 0;
    const judgeY = H * 0.78;
    const laneH  = judgeY - laneY;
    const bx     = W / 2 - GH_BLOCK_W / 2;

    ctx.save();

    // Lane background strip
    ctx.fillStyle = 'rgba(10,0,25,0.55)';
    ctx.beginPath();
    ctx.roundRect(laneX, laneY, GH_LANE_W, laneH + 48, 14);
    ctx.fill();

    // Lane edge lines
    ctx.strokeStyle = 'rgba(100,0,180,0.35)';
    ctx.lineWidth   = 1;
    ctx.beginPath();
    ctx.moveTo(laneX, laneY); ctx.lineTo(laneX, judgeY + 48);
    ctx.moveTo(laneX + GH_LANE_W, laneY); ctx.lineTo(laneX + GH_LANE_W, judgeY + 48);
    ctx.stroke();

    // Judgment line — pulses on beat
    const beatAge   = lastBeatPerfNow > 0 ? now - lastBeatPerfNow : 9999;
    const beatPulse = beatAge < 120 ? 1 - beatAge / 120 : 0;
    const jAlpha    = 0.55 + beatPulse * 0.45;
    const jWidth    = 2 + beatPulse * 3;
    ctx.strokeStyle = `rgba(200,80,255,${jAlpha.toFixed(2)})`;
    ctx.lineWidth   = jWidth;
    ctx.shadowColor = '#cc44ff';
    ctx.shadowBlur  = 8 + beatPulse * 14;
    ctx.beginPath();
    ctx.moveTo(laneX, judgeY); ctx.lineTo(laneX + GH_LANE_W, judgeY);
    ctx.stroke();
    ctx.shadowBlur  = 0;

    // Mark expired (unscored) blocks as missed
    for (const b of fallingBlocks) {
        if (!b.scored && now - b.targetMs > 280) {
            b.scored    = true;
            b.hitResult = 'miss';
            b.hitAt     = now;
        }
    }

    // Draw blocks
    for (const b of fallingBlocks) {
        const elapsed = now - (b.targetMs - LOOKAHEAD_MS);
        if (elapsed < 0) continue;
        const y = laneY + elapsed / LOOKAHEAD_MS * laneH;
        if (y > judgeY + 70) continue;

        const cy = y;

        let color;
        if (!b.hitResult) {
            color = '#cc44ff';
        } else if (b.hitResult === 'perfekt') {
            color = '#44ffaa';
        } else if (b.hitResult === 'dobre') {
            color = '#ffdd44';
        } else {
            color = '#ff4455';
        }

        let alpha = 1;
        if (b.hitResult) {
            const hitAge = now - b.hitAt;
            alpha = Math.max(0, 1 - hitAge / 380);
            if (alpha <= 0) continue;
        }

        ctx.globalAlpha = alpha;
        ctx.fillStyle   = color;
        ctx.shadowColor = color;
        ctx.shadowBlur  = 14;
        ctx.beginPath();
        ctx.roundRect(bx, cy - GH_BLOCK_H / 2, GH_BLOCK_W, GH_BLOCK_H, 8);
        ctx.fill();
        ctx.shadowBlur  = 0;

        // Perfect hit explosion ring
        if (b.hitResult === 'perfekt') {
            const hitAge = now - b.hitAt;
            if (hitAge < 320) {
                const r   = 18 + hitAge * 0.28;
                const alp = (1 - hitAge / 320) * alpha;
                ctx.globalAlpha = alp;
                ctx.strokeStyle = '#44ffaa';
                ctx.lineWidth   = 3;
                ctx.shadowColor = '#44ffaa';
                ctx.shadowBlur  = 10;
                ctx.beginPath();
                ctx.arc(W / 2, judgeY, r, 0, Math.PI * 2);
                ctx.stroke();
                ctx.shadowBlur = 0;
            }
        }

        ctx.globalAlpha = 1;
    }

    // Cleanup old blocks
    const cutoff = now - 700;
    for (let i = fallingBlocks.length - 1; i >= 0; i--) {
        if (fallingBlocks[i].targetMs < cutoff) fallingBlocks.splice(i, 1);
    }

    ctx.restore();
}

// ── Boot ─────────────────────────────────────────────────────────────
(async () => {
    renderLoop();
    await startCamera();
    await initDetector();
    poseLoop();
})();
</script>
</body>
</html>
